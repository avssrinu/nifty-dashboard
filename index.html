<!DOCTYPE html>
<html>

<head>
<title>NIFTY OPTION DASHBOARD</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

table{
border-collapse:collapse;
margin:auto;
}

td,th{
border:1px solid #444;
padding:6px;
}

th{
background:#333;
}

</style>

</head>

<body>

<h2>NIFTY OPTION CHAIN</h2>

<table id="optionTable">
<tr>
<th>Strike</th>
<th>Call OI</th>
<th>Put OI</th>
</tr>
</table>

<script>

async function loadData(){

let url="https://cdn.jsdelivr.net/gh/iam-veeramalla/nse-data/option-chain-nifty.json";

let response=await fetch(url);

let data=await response.json();

let table=document.getElementById("optionTable");

data.data.forEach(row=>{

let tr=document.createElement("tr");

tr.innerHTML=
"<td>"+row.strike+"</td>"+
"<td>"+row.callOI+"</td>"+
"<td>"+row.putOI+"</td>";

table.appendChild(tr);

});

}

loadData();

</script>

</body>

</html>
