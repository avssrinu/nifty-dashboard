<!DOCTYPE html>
<html>

<head>

<title>NIFTY OPTIONS TRADING DASHBOARD</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#22c55e;
margin-bottom:20px;
}

.dashboard{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-bottom:30px;
}

.box{
background:#1e293b;
padding:18px;
border-radius:10px;
width:150px;
font-size:18px;
font-weight:bold;
}

.green{
color:#22c55e;
}

.red{
color:#ef4444;
}

iframe{
border:none;
width:95%;
height:850px;
}

</style>

</head>

<body>

<h1>NIFTY OPTIONS DASHBOARD</h1>

<div class="dashboard">

<div class="box">
Nifty<br>
<span id="nifty">Loading</span>
</div>

<div class="box">
ATM<br>
<span id="atm">Loading</span>
</div>

<div class="box">
Support<br>
<span id="support">Loading</span>
</div>

<div class="box">
Resistance<br>
<span id="resistance">Loading</span>
</div>

<div class="box">
PCR<br>
<span id="pcr">Loading</span>
</div>

<div class="box">
Bias<br>
<span id="bias">Loading</span>
</div>

</div>

<iframe src="https://www.moneycontrol.com/india/indexfutures/nifty/9/2024-06-27/OPTIDX/CE/24200"></iframe>

<script>

function updateDashboard(){

// example values
let nifty=24210;

let atm=Math.round(nifty/50)*50;

let support=24000;

let resistance=24300;

let pcr=0.94;

document.getElementById("nifty").innerText=nifty;
document.getElementById("atm").innerText=atm;
document.getElementById("support").innerText=support;
document.getElementById("resistance").innerText=resistance;
document.getElementById("pcr").innerText=pcr;

if(pcr>1){
document.getElementById("bias").innerHTML="<span class='green'>Bullish</span>";
}else{
document.getElementById("bias").innerHTML="<span class='red'>Bearish</span>";
}

}

updateDashboard();

setInterval(updateDashboard,30000);

</script>

</body>

</html>
