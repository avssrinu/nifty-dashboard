<!DOCTYPE html>
<html>

<head>

<title>NIFTY OPTIONS DASHBOARD</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:#0f172a;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#22c55e;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.card h3{
margin:0;
font-size:16px;
color:#94a3b8;
}

iframe{
width:100%;
height:700px;
border:none;
}

</style>

</head>

<body>

<div class="header">

NIFTY OPTIONS PROFESSIONAL DASHBOARD

</div>

<div class="grid">

<div class="card">

<h3>LIVE NIFTY PRICE</h3>

<div class="tradingview-widget-container">
<div id="tradingview_nifty"></div>
<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
symbol: "NSE:NIFTY",
interval: "1",
timezone: "Asia/Kolkata",
theme: "dark",
style: "3",
width: "100%",
height: "80",
locale: "en",
container_id: "tradingview_nifty"
});
</script>

</div>

</div>

<div class="card">

<h3>NIFTY CHART</h3>

<div class="tradingview-widget-container">
<div id="tradingview_chart"></div>

<script>
new TradingView.widget({
symbol: "NSE:NIFTY",
interval: "5",
timezone: "Asia/Kolkata",
theme: "dark",
style: "1",
width: "100%",
height: "300",
locale: "en",
container_id: "tradingview_chart"
});
</script>

</div>

</div>

<div class="card">

<h3>OPTION CHAIN</h3>

<iframe src="https://www.moneycontrol.com/india/indexfutures/nifty/9/2024-06-27/OPTIDX/CE/24000"></iframe>

</div>

<div class="card">

<h3>OPTION HEATMAP</h3>

<iframe src="https://www.moneycontrol.com/india/indexfutures/nifty/9/2024-06-27/OPTIDX/PE/24000"></iframe>

</div>

</div>

</body>

</html>
