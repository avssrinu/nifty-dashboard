<!DOCTYPE html>
<html>

<head>

<title>NIFTY ADVANCED OPTIONS DASHBOARD</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:#0f172a;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
color:#22c55e;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
padding:18px;
border-radius:10px;
text-align:center;
}

.label{
font-size:14px;
color:#94a3b8;
}

.value{
font-size:26px;
font-weight:bold;
margin-top:5px;
}

.green{color:#22c55e}
.red{color:#ef4444}

.meter{
height:22px;
background:#334155;
border-radius:10px;
overflow:hidden;
margin:20px;
}

.fill{
height:100%;
background:#22c55e;
width:50%;
}

.table{
margin:20px;
width:95%;
border-collapse:collapse;
}

.table th{
background:#1e293b;
padding:10px;
}

.table td{
padding:8px;
text-align:center;
}

iframe{
border:none;
width:100%;
height:800px;
}

</style>

</head>

<body>

<div class="header">

NIFTY PRO OPTIONS TERMINAL

</div>

<div class="grid">

<div class="card">
<div class="label">NIFTY</div>
<div id="nifty" class="value"></div>
</div>

<div class="card">
<div class="label">ATM STRIKE</div>
<div id="atm" class="value"></div>
</div>

<div class="card">
<div class="label">SUPPORT</div>
<div id="support" class="value green"></div>
</div>

<div class="card">
<div class="label">RESISTANCE</div>
<div id="resistance" class="value red"></div>
</div>

<div class="card">
<div class="label">PCR</div>
<div id="pcr" class="value"></div>
</div>

<div class="card">
<div class="label">MAX PAIN</div>
<div id="maxpain" class="value"></div>
</div>

<div class="card">
<div class="label">EXPIRY RANGE</div>
<div id="range" class="value"></div>
</div>

<div class="card">
<div class="label">MARKET BIAS</div>
<div id="bias" class="value"></div>
</div>

</div>

<div class="meter">
<div id="sentiment" class="fill"></div>
</div>

<h3 style="text-align:center">OPTION HEAT MAP</h3>

<table class="table">

<tr>
<th>Strike</th>
<th>Call OI</th>
<th>Put OI</th>
</tr>

<tr>
<td>24100</td>
<td style="color:red">2.1M</td>
<td style="color:green">1.2M</td>
</tr>

<tr>
<td>24200</td>
<td style="color:red">2.9M</td>
<td style="color:green">1.8M</td>
</tr>

<tr>
<td>24300</td>
<td style="color:red">3.6M</td>
<td style="color:green">0.9M</td>
</tr>

</table>

<h3 style="text-align:center">LIVE OPTION CHAIN</h3>

<iframe src="https://www.moneycontrol.com/india/indexfutures/nifty/9/2024-06-27/OPTIDX/CE/24200"></iframe>

<script>

function update(){

let nifty=24215

let atm=Math.round(nifty/50)*50

let support=24000

let resistance=24300

let pcr=0.95

let maxpain=24200

let rangeLow=24000
let rangeHigh=24400

document.getElementById("nifty").innerText=nifty
document.getElementById("atm").innerText=atm
document.getElementById("support").innerText=support
document.getElementById("resistance").innerText=resistance
document.getElementById("pcr").innerText=pcr
document.getElementById("maxpain").innerText=maxpain
document.getElementById("range").innerText=rangeLow+" - "+rangeHigh

if(pcr>1){

document.getElementById("bias").innerHTML="<span class='green'>BULLISH</span>"
document.getElementById("sentiment").style.width="70%"

}else{

document.getElementById("bias").innerHTML="<span class='red'>BEARISH</span>"
document.getElementById("sentiment").style.width="35%"

}

}

update()

setInterval(update,30000)

</script>

</body>
</html>
