<!DOCTYPE html>
<html>

<head>

<title>NIFTY OPTIONS PRO TERMINAL</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:#0f172a;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#22c55e;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
padding:18px;
border-radius:10px;
text-align:center;
}

.label{
font-size:14px;
color:#94a3b8;
}

.value{
font-size:26px;
font-weight:bold;
margin-top:5px;
}

.green{color:#22c55e}
.red{color:#ef4444}

.meter{
height:22px;
background:#334155;
border-radius:10px;
overflow:hidden;
margin:20px;
}

.fill{
height:100%;
background:#22c55e;
width:50%;
}

.table{
margin:20px;
width:95%;
border-collapse:collapse;
}

.table th{
background:#1e293b;
padding:10px;
}

.table td{
padding:8px;
text-align:center;
}

iframe{
border:none;
width:100%;
height:800px;
}

</style>

</head>

<body>

<div class="header">

NIFTY OPTIONS PRO TERMINAL V3

</div>

<div class="grid">

<div class="card">
<div class="label">NIFTY</div>
<div id="nifty" class="value"></div>
</div>

<div class="card">
<div class="label">ATM</div>
<div id="atm" class="value"></div>
</div>

<div class="card">
<div class="label">SUPPORT</div>
<div id="support" class="value green"></div>
</div>

<div class="card">
<div class="label">RESISTANCE</div>
<div id="resistance" class="value red"></div>
</div>

<div class="card">
<div class="label">PCR</div>
<div id="pcr" class="value"></div>
</div>

<div class="card">
<div class="label">MAX PAIN</div>
<div id="maxpain" class="value"></div>
</div>

<div class="card">
<div class="label">EXPIRY RANGE</div>
<div id="range" class="value"></div>
</div>

<div class="card">
<div class="label">BIAS</div>
<div id="bias" class="value"></div>
</div>

<div class="card">
<div class="label">SIGNAL</div>
<div id="signal" class="value"></div>
</div>

<div class="card">
<div class="label">UPDATE</div>
<div id="time" class="value"></div>
</div>

</div>

<div class="meter">
<div id="sentiment" class="fill"></div>
</div>

<h3 style="text-align:center">OPTION HEAT MAP</h3>

<table class="table">

<tr>
<th>Strike</th>
<th>Call OI</th>
<th>Put OI</th>
</tr>

<tr>
<td>24100</td>
<td style="color:red">2.1M</td>
<td style="color:green">1.4M</td>
</tr>

<tr>
<td>24200</td>
<td style="color:red">3.2M</td>
<td style="color:green">2.0M</td>
</tr>

<tr>
<td>24300</td>
<td style="color:red">3.9M</td>
<td style="color:green">0.8M</td>
</tr>

</table>

<h3 style="text-align:center">LIVE OPTION CHAIN</h3>

<iframe src="https://www.moneycontrol.com/india/indexfutures/nifty/9/2024-06-27/OPTIDX/CE/24200"></iframe>

<script>

<script>

async function update(){

try{

let url = "https://api.allorigins.win/raw?url=" +
encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/%5ENSEI")

let response = await fetch(url)

let data = await response.json()

let nifty = data.chart.result[0].meta.regularMarketPrice

let atm = Math.round(nifty/50)*50

let support = atm - 200
let resistance = atm + 200

let pcr = 0.96
let maxpain = atm

let rangeLow = atm - 200
let rangeHigh = atm + 200

document.getElementById("nifty").innerHTML = nifty.toFixed(2)
document.getElementById("atm").innerHTML = atm
document.getElementById("support").innerHTML = support
document.getElementById("resistance").innerHTML = resistance
document.getElementById("pcr").innerHTML = pcr
document.getElementById("maxpain").innerHTML = maxpain
document.getElementById("range").innerHTML = rangeLow + " - " + rangeHigh

let signal = "WAIT"

if(nifty > atm){
signal = "BUY CALL"
}else{
signal = "BUY PUT"
}

document.getElementById("signal").innerHTML = signal

let d = new Date()
document.getElementById("time").innerHTML = d.toLocaleTimeString()

}catch(e){

console.log("API Error",e)

}

}

update()

setInterval(update,60000)

</script>
</script>

</script>
</script>

</body>
</html>
